    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was ist Red Teaming für Hotels?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Red Teaming für Hotels ist eine realitätsnahe Prüfung der Krisen- und Notfallfähigkeit eines Hotels. Dabei werden physische, digitale und organisatorische Sicherheitskonzepte unter realen Bedingungen getestet – nicht theoretisch, sondern so, wie es ein echtes Ereignis tun würde."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist das Zertifikat Operational Trust Certified Hotel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das Zertifikat Operational Trust Certified Hotel wird nach einem erfolgreichen Red Teaming Assessment vergeben. Es bestätigt, dass ein Hotel seine Krisen- und Notfallfähigkeit real getestet und nachgewiesen hat. Das Zertifikat ist Teil des Red Teaming Abonnements."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist der Unterschied zwischen Red Teaming und einem klassischen Sicherheitsaudit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ein klassischer Audit prüft entlang von Standards und Checklisten und dokumentiert, was vorhanden ist. Red Teaming simuliert realistische Ereignisse und zeigt, was wirklich passiert – unter echtem Druck, ohne Vorwarnung. Der Fokus liegt auf Handlungsfähigkeit im Ernstfall, nicht auf Compliance."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Bereiche prüft Red Teaming Switzerland bei Hotels?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Red Teaming Switzerland prüft Hotels in vier Dimensionen: physische Sicherheit und Evakuationsfähigkeit, digitale Sicherheit und Cyber-Resilienz, organisatorische Entscheidungswege und Führungsfähigkeit sowie Social Engineering und menschliche Schwachstellen."
          }
        },
        {
          "@type": "Question",
          "name": "Wie läuft ein Red Teaming Assessment ab?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ein Red Teaming Assessment beginnt mit einem 30-minütigen Erstgespräch auf Direktionsstufe. Danach folgt das initiale Assessment über zwei Monate (OSINT-Screening, Cyber-Screen, physische Begehung). Nach erfolgreichem Assessment wird das Zertifikat übergeben. Im Rahmen des Abos folgt laufendes Monitoring mit Phishing-Tests, Vishing-Tests und halbjährlichem Re-Screen."
          }
        },
        {
          "@type": "Question",
          "name": "Für welche Hotels ist Red Teaming geeignet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Red Teaming ist für Hotels geeignet, die ihre Krisen- und Notfallfähigkeit real testen und nachweisen wollen. Das Abo richtet sich an Hotels, die operative Sicherheit dauerhaft verankern möchten. Die einmalige Standortbestimmung eignet sich für Hotels, die zunächst verstehen wollen, wo sie heute stehen."
          }
        }
      ]
    }
